<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="finance-notification-verified-title finance-notification-verified-desc">
  <title id="finance-notification-verified-title">finance.notification.verified</title>
  <desc id="finance-notification-verified-desc">Finance Notification in Verified state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/external-system.svg.</desc>
  <defs>
    <linearGradient id="finance-notification-verified-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7" stop-opacity="0.5" />
      <stop offset="1" stop-color="#eafdf1"/>
    </linearGradient>
    <linearGradient id="finance-notification-verified-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="finance-notification-verified-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#finance-notification-verified-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#finance-notification-verified-bg)" stroke="#16A34A" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M24 38H40L38 34V28C38 23.6 35.3 20.3 32 19C28.7 20.3 26 23.6 26 28V34L24 38Z" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M29 42C29.7 43.7 30.8 44.5 32 44.5C33.2 44.5 34.3 43.7 35 42" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
