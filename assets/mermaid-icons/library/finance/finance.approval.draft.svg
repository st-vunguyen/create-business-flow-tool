<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="finance-approval-draft-title finance-approval-draft-desc">
  <title id="finance-approval-draft-title">finance.approval.draft</title>
  <desc id="finance-approval-draft-desc">Finance Approval in Draft state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
