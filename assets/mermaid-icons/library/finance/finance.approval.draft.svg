      <stop stop-color="#DCFCE7" stop-opacity="0.5" />
      <stop offset="1" stop-color="#eafdf1"/>
    </linearGradient>
    <linearGradient id="finance-approval-draft-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="finance-approval-draft-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#finance-approval-draft-shadow)">
