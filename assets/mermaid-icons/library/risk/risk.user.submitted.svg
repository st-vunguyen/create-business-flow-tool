<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="risk-user-submitted-title risk-user-submitted-desc">
  <title id="risk-user-submitted-title">risk.user.submitted</title>
  <desc id="risk-user-submitted-desc">Risk User in Submitted state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="risk-user-submitted-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEE2E2" stop-opacity="0.5" />
      <stop offset="1" stop-color="#feeeee"/>
    </linearGradient>
    <linearGradient id="risk-user-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B91C1C"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="risk-user-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#risk-user-submitted-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#risk-user-submitted-bg)" stroke="#DC2626" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <circle cx="32" cy="25" r="6" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M22 42C24.4 37.8 28 35.5 32 35.5C36 35.5 39.6 37.8 42 42" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
      <path d="M-4 0H4M0 -4L4 0L0 4" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
