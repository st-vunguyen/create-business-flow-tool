<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="risk-ticket-approved-title risk-ticket-approved-desc">
  <title id="risk-ticket-approved-title">risk.ticket.approved</title>
  <desc id="risk-ticket-approved-desc">Risk Ticket in Approved state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
