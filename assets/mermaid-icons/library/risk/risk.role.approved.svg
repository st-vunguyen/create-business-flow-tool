<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="risk-role-approved-title risk-role-approved-desc">
  <title id="risk-role-approved-title">risk.role.approved</title>
