<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="risk-report-rejected-title risk-report-rejected-desc">
  <title id="risk-report-rejected-title">risk.report.rejected</title>
  <desc id="risk-report-rejected-desc">Risk Report in Rejected state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/data-store.svg.</desc>
  <defs>
    <linearGradient id="risk-report-rejected-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEE2E2" stop-opacity="0.5" />
      <stop offset="1" stop-color="#feeeee"/>
    </linearGradient>
    <linearGradient id="risk-report-rejected-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B91C1C"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="risk-report-rejected-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#risk-report-rejected-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#risk-report-rejected-bg)" stroke="#DC2626" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M22 42V22" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M22 42H44" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="26" y="32" width="4" height="10" rx="1.5" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="33" y="27" width="4" height="15" rx="1.5" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="40" y="24" width="4" height="18" rx="1.5" stroke="#B91C1C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#FECACA" stroke-width="1.5"/>
      <path d="M-3 -3L3 3M3 -3L-3 3" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
