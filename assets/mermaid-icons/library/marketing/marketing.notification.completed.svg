<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marketing-notification-completed-title marketing-notification-completed-desc">
  <title id="marketing-notification-completed-title">marketing.notification.completed</title>
  <desc id="marketing-notification-completed-desc">Marketing Notification in Completed state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/external-system.svg.</desc>
  <defs>
    <linearGradient id="marketing-notification-completed-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE7F3" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fdf1f8"/>
    </linearGradient>
    <linearGradient id="marketing-notification-completed-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BE185D"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="marketing-notification-completed-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#marketing-notification-completed-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#marketing-notification-completed-bg)" stroke="#DB2777" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M24 38H40L38 34V28C38 23.6 35.3 20.3 32 19C28.7 20.3 26 23.6 26 28V34L24 38Z" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M29 42C29.7 43.7 30.8 44.5 32 44.5C33.2 44.5 34.3 43.7 35 42" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
