<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marketing-rule-approved-title marketing-rule-approved-desc">
  <title id="marketing-rule-approved-title">marketing.rule.approved</title>
  <desc id="marketing-rule-approved-desc">Marketing Rule in Approved state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
    <linearGradient id="marketing-rule-approved-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE7F3" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fdf1f8"/>
    </linearGradient>
    <linearGradient id="marketing-rule-approved-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BE185D"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="marketing-rule-approved-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#marketing-rule-approved-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#marketing-rule-approved-bg)" stroke="#DB2777" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M32 20V42" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 24H40" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 24L20 30H28L24 24Z" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M40 24L36 30H44L40 24Z" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 40H36" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
