    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M20 24H44V30C41.5 30 39.5 32 39.5 34.5C39.5 37 41.5 39 44 39V44H20V39C22.5 39 24.5 37 24.5 34.5C24.5 32 22.5 30 20 30V24Z" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M32 24V44" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="3 4"/>
