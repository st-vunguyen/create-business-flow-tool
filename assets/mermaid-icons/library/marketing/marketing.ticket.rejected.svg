<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marketing-ticket-rejected-title marketing-ticket-rejected-desc">
  <title id="marketing-ticket-rejected-title">marketing.ticket.rejected</title>
  <desc id="marketing-ticket-rejected-desc">Marketing Ticket in Rejected state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
