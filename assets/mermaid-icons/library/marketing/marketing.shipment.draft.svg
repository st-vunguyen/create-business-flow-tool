<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marketing-shipment-draft-title marketing-shipment-draft-desc">
  <title id="marketing-shipment-draft-title">marketing.shipment.draft</title>
  <desc id="marketing-shipment-draft-desc">Marketing Shipment in Draft state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/external-system.svg.</desc>
  <defs>
    <linearGradient id="marketing-shipment-draft-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE7F3" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fdf1f8"/>
    </linearGradient>
    <linearGradient id="marketing-shipment-draft-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BE185D"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="marketing-shipment-draft-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#marketing-shipment-draft-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#marketing-shipment-draft-bg)" stroke="#DB2777" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M21 28L32 22L43 28L32 34L21 28Z" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M21 28V38L32 44L43 38V28" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M32 34V44" stroke="#BE185D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <path d="M-3.5 0.5L1.5 -4.5L3.5 -2.5L-1.5 2.5L-4.5 3.5L-3.5 0.5Z" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
