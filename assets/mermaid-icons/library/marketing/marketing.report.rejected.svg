      <stop stop-color="#FCE7F3" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fdf1f8"/>
    </linearGradient>
    <linearGradient id="marketing-report-rejected-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BE185D"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="marketing-report-rejected-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
