<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="marketing-report-rejected-title marketing-report-rejected-desc">
  <title id="marketing-report-rejected-title">marketing.report.rejected</title>
  <desc id="marketing-report-rejected-desc">Marketing Report in Rejected state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/data-store.svg.</desc>
  <defs>
