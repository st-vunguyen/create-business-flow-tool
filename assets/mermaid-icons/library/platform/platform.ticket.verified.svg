<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="platform-ticket-verified-title platform-ticket-verified-desc">
  <title id="platform-ticket-verified-title">platform.ticket.verified</title>
  <desc id="platform-ticket-verified-desc">Platform Ticket in Verified state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="platform-ticket-verified-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0" stop-opacity="0.5" />
      <stop offset="1" stop-color="#eef1f6"/>
    </linearGradient>
    <linearGradient id="platform-ticket-verified-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="platform-ticket-verified-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#platform-ticket-verified-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#platform-ticket-verified-bg)" stroke="#475569" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M20 24H44V30C41.5 30 39.5 32 39.5 34.5C39.5 37 41.5 39 44 39V44H20V39C22.5 39 24.5 37 24.5 34.5C24.5 32 22.5 30 20 30V24Z" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M32 24V44" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="3 4"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
