<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="platform-invoice-submitted-title platform-invoice-submitted-desc">
  <title id="platform-invoice-submitted-title">platform.invoice.submitted</title>
  <desc id="platform-invoice-submitted-desc">Platform Invoice in Submitted state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="platform-invoice-submitted-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0" stop-opacity="0.5" />
      <stop offset="1" stop-color="#eef1f6"/>
    </linearGradient>
    <linearGradient id="platform-invoice-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="platform-invoice-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#platform-invoice-submitted-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#platform-invoice-submitted-bg)" stroke="#475569" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M24 18H38L44 24V44H24Z" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M38 18V24H44" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 30H40" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 36H40" stroke="#334155" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
