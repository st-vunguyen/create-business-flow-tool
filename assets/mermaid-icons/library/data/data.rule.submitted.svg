<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="data-rule-submitted-title data-rule-submitted-desc">
  <title id="data-rule-submitted-title">data.rule.submitted</title>
  <desc id="data-rule-submitted-desc">Data Rule in Submitted state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
    <linearGradient id="data-rule-submitted-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ecf7fe"/>
    </linearGradient>
    <linearGradient id="data-rule-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="data-rule-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#data-rule-submitted-shadow)">
