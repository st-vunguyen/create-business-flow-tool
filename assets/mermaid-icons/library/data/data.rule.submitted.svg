    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#data-rule-submitted-bg)" stroke="#0284C7" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M32 20V42" stroke="#0369A1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 24H40" stroke="#0369A1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 24L20 30H28L24 24Z" stroke="#0369A1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M40 24L36 30H44L40 24Z" stroke="#0369A1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 40H36" stroke="#0369A1" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
      <path d="M-4 0H4M0 -4L4 0L0 4" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
