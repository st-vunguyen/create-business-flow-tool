    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#content-role-completed-bg)" stroke="#64748B" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M32 18L41 22V29C41 35 37 39.5 32 43C27 39.5 23 35 23 29V22L32 18Z" stroke="#475569" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="32" cy="28" r="3.5" stroke="#475569" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 35C29.2 33.8 30.5 33.2 32 33.2C33.5 33.2 34.8 33.8 36 35" stroke="#475569" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

