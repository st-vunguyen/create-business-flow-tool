<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="content-role-completed-title content-role-completed-desc">
  <title id="content-role-completed-title">content.role.completed</title>
  <desc id="content-role-completed-desc">Content Role in Completed state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
