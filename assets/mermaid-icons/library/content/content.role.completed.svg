      <stop stop-color="#F1F5F9" stop-opacity="0.5" />
      <stop offset="1" stop-color="#f7f9fb"/>
    </linearGradient>
    <linearGradient id="content-role-completed-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#475569"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>
    <filter id="content-role-completed-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#content-role-completed-shadow)">
