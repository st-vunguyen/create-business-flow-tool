<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="customer-notification-submitted-title customer-notification-submitted-desc">
  <title id="customer-notification-submitted-title">customer.notification.submitted</title>
  <desc id="customer-notification-submitted-desc">Customer Notification in Submitted state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/external-system.svg.</desc>
  <defs>
    <linearGradient id="customer-notification-submitted-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CCFBF1" stop-opacity="0.5" />
      <stop offset="1" stop-color="#e0fdf7"/>
    </linearGradient>
    <linearGradient id="customer-notification-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="customer-notification-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#customer-notification-submitted-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#customer-notification-submitted-bg)" stroke="#0D9488" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M24 38H40L38 34V28C38 23.6 35.3 20.3 32 19C28.7 20.3 26 23.6 26 28V34L24 38Z" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M29 42C29.7 43.7 30.8 44.5 32 44.5C33.2 44.5 34.3 43.7 35 42" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
      <path d="M-4 0H4M0 -4L4 0L0 4" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
