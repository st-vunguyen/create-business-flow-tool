<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="customer-rule-rejected-title customer-rule-rejected-desc">
  <title id="customer-rule-rejected-title">customer.rule.rejected</title>
  <desc id="customer-rule-rejected-desc">Customer Rule in Rejected state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
