<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="commerce-task-approved-title commerce-task-approved-desc">
  <title id="commerce-task-approved-title">commerce.task.approved</title>
  <desc id="commerce-task-approved-desc">Commerce Task in Approved state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="commerce-task-approved-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#e9f2fe"/>
    </linearGradient>
    <linearGradient id="commerce-task-approved-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="commerce-task-approved-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#commerce-task-approved-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#commerce-task-approved-bg)" stroke="#1D4ED8" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <rect x="18" y="20" width="8" height="8" rx="2" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M20 24L22.5 26.5L26 21.5" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M31 24H46" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M18 38H26" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M31 38H46" stroke="#2563EB" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
