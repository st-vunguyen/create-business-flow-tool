      <rect x="18" y="22" width="28" height="20" rx="4" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M18 28H46" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 36H31" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
