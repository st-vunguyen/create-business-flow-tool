<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="operations-payment-submitted-title operations-payment-submitted-desc">
  <title id="operations-payment-submitted-title">operations.payment.submitted</title>
  <desc id="operations-payment-submitted-desc">Operations Payment in Submitted state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
