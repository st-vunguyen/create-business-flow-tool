    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#operations-request-verified-bg)" stroke="#0284C7" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M18 28H36" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M30 22L36 28L30 34" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M18 38H46V44H18Z" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

