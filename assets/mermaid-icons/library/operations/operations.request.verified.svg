      <stop stop-color="#E0F2FE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ecf7fe"/>
    </linearGradient>
    <linearGradient id="operations-request-verified-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="operations-request-verified-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#operations-request-verified-shadow)">
