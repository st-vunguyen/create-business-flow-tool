<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="operations-request-verified-title operations-request-verified-desc">
  <title id="operations-request-verified-title">operations.request.verified</title>
  <desc id="operations-request-verified-desc">Operations Request in Verified state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
