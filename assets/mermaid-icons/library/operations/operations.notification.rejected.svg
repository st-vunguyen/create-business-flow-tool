<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="operations-notification-rejected-title operations-notification-rejected-desc">
  <title id="operations-notification-rejected-title">operations.notification.rejected</title>
  <desc id="operations-notification-rejected-desc">Operations Notification in Rejected state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/external-system.svg.</desc>
  <defs>
    <linearGradient id="operations-notification-rejected-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ecf7fe"/>
    </linearGradient>
    <linearGradient id="operations-notification-rejected-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="operations-notification-rejected-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#operations-notification-rejected-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#operations-notification-rejected-bg)" stroke="#0284C7" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M24 38H40L38 34V28C38 23.6 35.3 20.3 32 19C28.7 20.3 26 23.6 26 28V34L24 38Z" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M29 42C29.7 43.7 30.8 44.5 32 44.5C33.2 44.5 34.3 43.7 35 42" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#FECACA" stroke-width="1.5"/>
      <path d="M-3 -3L3 3M3 -3L-3 3" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
