<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="operations-report-completed-title operations-report-completed-desc">
  <title id="operations-report-completed-title">operations.report.completed</title>
  <desc id="operations-report-completed-desc">Operations Report in Completed state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/data-store.svg.</desc>
  <defs>
    <linearGradient id="operations-report-completed-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ecf7fe"/>
    </linearGradient>
    <linearGradient id="operations-report-completed-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="operations-report-completed-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#operations-report-completed-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#operations-report-completed-bg)" stroke="#0284C7" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M22 42V22" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M22 42H44" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="26" y="32" width="4" height="10" rx="1.5" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="33" y="27" width="4" height="15" rx="1.5" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><rect x="40" y="24" width="4" height="18" rx="1.5" stroke="#1D4ED8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
