<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="identity-request-draft-title identity-request-draft-desc">
  <title id="identity-request-draft-title">identity.request.draft</title>
  <desc id="identity-request-draft-desc">Identity Request in Draft state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="identity-request-draft-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0E7FF" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ecf1ff"/>
    </linearGradient>
    <linearGradient id="identity-request-draft-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <filter id="identity-request-draft-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#identity-request-draft-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#identity-request-draft-bg)" stroke="#4338CA" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M18 28H36" stroke="#4F46E5" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M30 22L36 28L30 34" stroke="#4F46E5" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M18 38H46V44H18Z" stroke="#4F46E5" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <path d="M-3.5 0.5L1.5 -4.5L3.5 -2.5L-1.5 2.5L-4.5 3.5L-3.5 0.5Z" stroke="#94A3B8" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
