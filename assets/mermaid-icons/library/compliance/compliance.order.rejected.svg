<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="compliance-order-rejected-title compliance-order-rejected-desc">
  <title id="compliance-order-rejected-title">compliance.order.rejected</title>
  <desc id="compliance-order-rejected-desc">Compliance Order in Rejected state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="compliance-order-rejected-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D1FAE5" stop-opacity="0.5" />
      <stop offset="1" stop-color="#e3fcef"/>
    </linearGradient>
    <linearGradient id="compliance-order-rejected-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="compliance-order-rejected-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#compliance-order-rejected-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#compliance-order-rejected-bg)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M22 24H42L40 42H24L22 24Z" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M27 24V22C27 19.8 29.2 18 32 18C34.8 18 37 19.8 37 22V24" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#FECACA" stroke-width="1.5"/>
      <path d="M-3 -3L3 3M3 -3L-3 3" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
