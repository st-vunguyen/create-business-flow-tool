<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="compliance-user-rejected-title compliance-user-rejected-desc">
  <title id="compliance-user-rejected-title">compliance.user.rejected</title>
  <desc id="compliance-user-rejected-desc">Compliance User in Rejected state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="compliance-user-rejected-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D1FAE5" stop-opacity="0.5" />
      <stop offset="1" stop-color="#e3fcef"/>
    </linearGradient>
    <linearGradient id="compliance-user-rejected-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="compliance-user-rejected-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#compliance-user-rejected-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#compliance-user-rejected-bg)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <circle cx="32" cy="25" r="6" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M22 42C24.4 37.8 28 35.5 32 35.5C36 35.5 39.6 37.8 42 42" stroke="#0F766E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#FECACA" stroke-width="1.5"/>
      <path d="M-3 -3L3 3M3 -3L-3 3" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
