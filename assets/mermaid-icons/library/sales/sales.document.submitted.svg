<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sales-document-submitted-title sales-document-submitted-desc">
  <title id="sales-document-submitted-title">sales.document.submitted</title>
  <desc id="sales-document-submitted-desc">Sales Document in Submitted state. Suggested Mermaid class: external. Fallback export icon: assets/mermaid-icons/data-store.svg.</desc>
  <defs>
    <linearGradient id="sales-document-submitted-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFEDD5" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fff4e6"/>
    </linearGradient>
    <linearGradient id="sales-document-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2410C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="sales-document-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#sales-document-submitted-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#sales-document-submitted-bg)" stroke="#EA580C" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M22 22H36L42 28V42H22Z" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M36 22V28H42" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 32H36" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M28 38H36" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.5"/>
      <path d="M-4 0H4M0 -4L4 0L0 4" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
