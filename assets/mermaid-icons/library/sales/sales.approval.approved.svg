<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sales-approval-approved-title sales-approval-approved-desc">
  <title id="sales-approval-approved-title">sales.approval.approved</title>
  <desc id="sales-approval-approved-desc">Sales Approval in Approved state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
