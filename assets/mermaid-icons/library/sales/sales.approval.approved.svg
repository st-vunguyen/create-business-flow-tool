    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#sales-approval-approved-bg)" stroke="#EA580C" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <path d="M32 18L42 22V30C42 36 38 40.5 32 44C26 40.5 22 36 22 30V22L32 18Z" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M27.5 30L31 33.5L37.5 27" stroke="#C2410C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

