      <stop stop-color="#FFEDD5" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fff4e6"/>
    </linearGradient>
    <linearGradient id="sales-approval-approved-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C2410C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="sales-approval-approved-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#sales-approval-approved-shadow)">
