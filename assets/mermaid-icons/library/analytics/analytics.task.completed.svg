<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="analytics-task-completed-title analytics-task-completed-desc">
  <title id="analytics-task-completed-title">analytics.task.completed</title>
  <desc id="analytics-task-completed-desc">Analytics Task in Completed state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
    <linearGradient id="analytics-task-completed-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFEDD5" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fff4e6"/>
    </linearGradient>
    <linearGradient id="analytics-task-completed-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C2D12"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="analytics-task-completed-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#analytics-task-completed-shadow)">
    <!-- Base App-Style Squircle -->
    <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#analytics-task-completed-bg)" stroke="#EA580C" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <!-- Central Glyph (Scaled UP!) -->
    <g transform="translate(-14.4, -14.4) scale(1.45)">
      <rect x="18" y="20" width="8" height="8" rx="2" stroke="#7C2D12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M20 24L22.5 26.5L26 21.5" stroke="#7C2D12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M31 24H46" stroke="#7C2D12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M18 38H26" stroke="#7C2D12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M31 38H46" stroke="#7C2D12" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- State Badge (Bottom Right to not overlap glyph center) -->
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="10" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <path d="M-3.5 -0.5L-0.5 2.5L4 -2.5" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
