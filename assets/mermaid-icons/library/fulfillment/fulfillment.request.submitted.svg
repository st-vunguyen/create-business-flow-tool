<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fulfillment-request-submitted-title fulfillment-request-submitted-desc">
  <title id="fulfillment-request-submitted-title">fulfillment.request.submitted</title>
  <desc id="fulfillment-request-submitted-desc">Fulfillment Request in Submitted state. Suggested Mermaid class: process. Fallback export icon: assets/mermaid-icons/process.svg.</desc>
  <defs>
