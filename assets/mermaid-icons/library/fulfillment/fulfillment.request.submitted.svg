      <stop stop-color="#EDE9FE" stop-opacity="0.5" />
      <stop offset="1" stop-color="#f4f2fe"/>
    </linearGradient>
    <linearGradient id="fulfillment-request-submitted-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="fulfillment-request-submitted-shadow" x="2" y="2" width="60" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g filter="url(#fulfillment-request-submitted-shadow)">
