<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fulfillment-approval-verified-title fulfillment-approval-verified-desc">
  <title id="fulfillment-approval-verified-title">fulfillment.approval.verified</title>
  <desc id="fulfillment-approval-verified-desc">Fulfillment Approval in Verified state. Suggested Mermaid class: decision. Fallback export icon: assets/mermaid-icons/decision.svg.</desc>
  <defs>
